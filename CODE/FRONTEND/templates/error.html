<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - SIADD System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .error-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-container">
            <i class='bx bx-error-circle' style="font-size: 5rem; color: #dc3545;"></i>
            <h1 class="mt-4">Oops! Something went wrong</h1>
            <div class="alert alert-danger mt-4">
                <h4>Error Details:</h4>
                <p>{{ error_message }}</p>
            </div>
            <div class="mt-4">
                <a href="/home" class="btn btn-primary">
                    <i class='bx bx-home'></i> Go to Home
                </a>
                <a href="/predict" class="btn btn-outline-primary ms-2">
                    <i class='bx bx-arrow-back'></i> Back to Prediction
                </a>
            </div>
            <div class="mt-4 text-muted small">
                <p>If the problem persists, please check:</p>
                <ul class="text-start">
                    <li>Model files are in the correct directory</li>
                    <li>Database connection is working</li>
                    <li>Input values are valid numbers</li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
