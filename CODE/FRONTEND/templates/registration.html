<!DOCTYPE html>
<html lang="en">

<head>
    <title>Create Your Account - Purple Buzz</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="apple-touch-icon" href="\static\assets/img/apple-icon.png">
    <link rel="shortcut icon" type="image/x-icon" href="\static\assets/img/favicon.ico">
    <!-- Load Require CSS -->
    <link href="\static\assets/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font CSS -->
    <link href="\static\assets/css/boxicon.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Load Tempalte CSS -->
    <link rel="stylesheet" href="\static\assets/css/templatemo.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="\static\assets/css/custom.css">
    <style>
        :root {
            --primary-color: #6f42c1;
            --primary-light: #8c68cd;
            --primary-dark: #563d7c;
            --accent-color: #ff6b9d;
            --text-dark: #343a40;
            --text-light: #6c757d;
            --bg-light: #f8f9fa;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7ff 0%, #f0e6ff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-family: 'Open Sans', sans-serif;
        }
        
        .registration-container {
            max-width: 1000px;
            margin: 2rem auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .registration-hero {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .registration-hero::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .registration-hero::after {
            content: '';
            position: absolute;
            bottom: -80px;
            left: -80px;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .hero-title {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
        }
        
        .hero-subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 2rem;
            position: relative;
            z-index: 1;
        }
        
        .benefits-list {
            list-style: none;
            padding: 0;
            position: relative;
            z-index: 1;
        }
        
        .benefits-list li {
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
        }
        
        .benefits-list li i {
            margin-right: 10px;
            color: var(--accent-color);
            font-size: 1.2rem;
        }
        
        .registration-form {
            padding: 3rem;
        }
        
        .form-title {
            color: var(--primary-dark);
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 2rem;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }
        
        .form-control {
            padding: 1rem 1.5rem;
            border-radius: 50px;
            border: 2px solid #e9ecef;
            height: auto;
            transition: all 0.3s;
        }
        
        .form-control:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 0.25rem rgba(111, 66, 193, 0.25);
        }
        
        textarea.form-control {
            border-radius: 15px;
            resize: none;
        }
        
        .floating-label {
            position: absolute;
            top: 50%;
            left: 1.5rem;
            transform: translateY(-50%);
            background: white;
            padding: 0 0.5rem;
            color: var(--text-light);
            transition: all 0.3s;
            pointer-events: none;
        }
        
        textarea+.floating-label {
            top: 1.5rem;
            transform: none;
        }
        
        .form-control:focus+.floating-label,
        .form-control:not(:placeholder-shown)+.floating-label {
            top: 0;
            color: var(--primary-color);
            font-weight: 600;
        }
        
        .btn-register {
            background: linear-gradient(to right, var(--primary-color), var(--primary-dark));
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            border: none;
            font-weight: 600;
            font-size: 1.1rem;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(111, 66, 193, 0.4);
        }
        
        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(111, 66, 193, 0.6);
        }
        
        .btn-register:active {
            transform: translateY(0);
        }
        
        .login-redirect {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-light);
        }
        
        .login-redirect a {
            color: var(--primary-color);
            font-weight: 600;
            text-decoration: none;
        }
        
        .message-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1050;
            animation: fadeIn 0.5s, fadeOut 0.5s 2.5s forwards;
        }
        
        .message-box {
            background: white;
            border-left: 4px solid var(--primary-color);
            border-radius: 4px;
            padding: 1rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 350px;
        }
        
        .message-box h1 {
            font-size: 1.2rem;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }
        
        .message-box p {
            margin: 0;
            color: var(--text-dark);
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                visibility: hidden;
            }
        }
        
        @media (max-width: 768px) {
            .registration-container {
                flex-direction: column;
                margin: 1rem;
            }
            .registration-hero {
                padding: 2rem;
            }
            .registration-form {
                padding: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="registration-container">
        <div class="row no-gutters">
            <div class="col-md-6">
                <div class="registration-hero">
                    <h1 class="hero-title">Join Our Community</h1>
                    <p class="hero-subtitle">Create an account to access exclusive features and content</p>
                    <ul class="benefits-list">
                        <li><i class='bx bx-check-circle'></i> Save your preferences and settings</li>
                    </ul>
                </div>
            </div>
            <div class="col-md-6">
                <div class="registration-form">
                    <h2 class="form-title">Create Account</h2>
                    <form class="form" action="{{url_for('registration')}}" method="post">
                        <div class="form-group">
                            <input type="text" class="form-control" id="name" name="name" placeholder=" " required>
                            <label for="name" class="floating-label">Full Name</label>
                        </div>
                        <div class="form-group">
                            <input type="email" class="form-control" id="email" name="email" placeholder=" " required>
                            <label for="email" class="floating-label">Email Address</label>
                        </div>
                        <div class="form-group">
                            <input type="password" class="form-control" id="password" name="password" placeholder=" " required>
                            <label for="password" class="floating-label">Password</label>
                        </div>
                        <div class="form-group">
                            <input type="password" class="form-control" id="confirmpassword" name="confirmpassword" placeholder=" " required>
                            <label for="confirmpassword" class="floating-label">Confirm Password</label>
                        </div>
                        <div class="form-group">
                            <textarea class="form-control" id="address" name="address" rows="3" placeholder=" " required></textarea>
                            <label for="address" class="floating-label">Address</label>
                        </div>
                        <button type="submit" class="btn btn-register">Create Account</button>
                    </form>
                    <div class="login-redirect">
                        Already have an account? <a href="#">Sign In</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    {% if msg %}
    <div class="message-container">
        <div class="message-box">
            <h1>Notification</h1>
            <p>{{ msg }}</p>
        </div>
    </div>
    {% endif %}

    <!-- Bootstrap -->
    <script src="\static\assets/js/bootstrap.bundle.min.js"></script>
    <!-- Lightbox -->
    <script src="\static\assets/js/fslightbox.js"></script>
    <script>
        fsLightboxInstances['gallery'].props.loadOnlyCurrentSource = true;
    </script>
    <!-- Load jQuery require for isotope -->
    <script src="\static\assets/js/jquery.min.js"></script>
    <!-- Isotope -->
    <script src="\static\assets/js/isotope.pkgd.js"></script>
    <!-- Page Script -->
    <script>
        $(window).load(function() {
            // init Isotope
            var $projects = $('.projects').isotope({
                itemSelector: '.project',
                layoutMode: 'fitRows'
            });
            $(".filter-btn").click(function() {
                var data_filter = $(this).attr("data-filter");
                $projects.isotope({
                    filter: data_filter
                });
                $(".filter-btn").removeClass("active");
                $(".filter-btn").removeClass("shadow");
                $(this).addClass("active");
                $(this).addClass("shadow");
                return false;
            });
        });

        // Add floating label functionality
        document.querySelectorAll('.form-control').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('focused');
            });
            
            input.addEventListener('blur', () => {
                if (input.value === '') {
                    input.parentElement.classList.remove('focused');
                }
            });
            
            // Check on page load if inputs have values
            if (input.value !== '') {
                input.parentElement.classList.add('focused');
            }
        });
    </script>
    <!-- Templatemo -->
    <script src="\static\assets/js/templatemo.js"></script>
    <!-- Custom -->
    <script src="\static\assets/js/custom.js"></script>
</body>

</html>
